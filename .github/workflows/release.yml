name: Release .ehpk

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync app.json version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          BASE="${TAG#v}"
          VERSION="${BASE%%-*}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag $TAG does not yield a valid app.json version (need x.y.z)"
            exit 1
          fi
          jq --arg v "$VERSION" '.version = $v' app.json > app.json.tmp
          mv app.json.tmp app.json
          echo "app.json version set to $VERSION (tag: $TAG)"

      - name: Build web app (LAN endpoints)
        env:
          VITE_CHARGE_SERVER_URL: http://100.100.80.120:8088
          VITE_GHDAG_UI_URL: http://100.100.80.120:8080
        run: npm run build

      - name: Pack .ehpk
        run: |
          npx evenhub pack app.json dist -o nexus-companion.ehpk || true
          if [ ! -f nexus-companion.ehpk ]; then
            echo "nexus-companion.ehpk was not created"
            exit 1
          fi
          ls -la nexus-companion.ehpk

      - name: Detect prerelease
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARGS=(--title "$TAG" --generate-notes)
          if [[ "${{ steps.meta.outputs.prerelease }}" == "true" ]]; then
            ARGS+=(--prerelease)
          fi
          gh release create "$TAG" "${ARGS[@]}" nexus-companion.ehpk

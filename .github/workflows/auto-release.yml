name: Auto Release on main push

on:
  push:
    branches:
      - main

concurrency:
  group: auto-release-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  auto-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APP_VERSION=$(jq -r '.version' app.json)
          PREV_APP_VERSION=$(git show HEAD~1:app.json 2>/dev/null | jq -r '.version' 2>/dev/null || echo "")
          LATEST_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION="${LATEST_TAG#v}"

          if [ "$APP_VERSION" != "$PREV_APP_VERSION" ] && [ -n "$APP_VERSION" ] && [ "$APP_VERSION" != "0.0.0" ]; then
            NEW_VERSION="$APP_VERSION"
            echo "app.json updated: using version $NEW_VERSION"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
            PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "Bumping patch: $LATEST_VERSION -> $NEW_VERSION"
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync app.json version
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' app.json > app.json.tmp
          mv app.json.tmp app.json
          echo "app.json version set to ${{ steps.version.outputs.version }}"

      - name: Build web app (LAN endpoints)
        env:
          VITE_CHARGE_SERVER_URL: http://100.105.166.81:8088
          VITE_GHDAG_UI_URL: http://100.105.166.81:8080
        run: npm run build

      - name: Pack .ehpk
        run: |
          npx evenhub pack app.json dist -o nexus-companion.ehpk || true
          if [ ! -f nexus-companion.ehpk ]; then
            echo "nexus-companion.ehpk was not created"
            exit 1
          fi
          ls -la nexus-companion.ehpk

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            nexus-companion.ehpk
